<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Page Not Found | EmailArmor</title>
    <link rel="stylesheet" href="index.css">
    <style>
        .error-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="container error-container">
        <h1 style="font-size: 8rem;" class="gradient-text">404</h1>
        <h2 style="margin-bottom: 2rem;">Oops! This page has been filtered.</h2>
        <p style="color: var(--text-dim); margin-bottom: 3rem; max-width: 500px;">The address you were looking for doesn't exist or has moved to a new destination. Check your syntax and try again.</p>
        <a href="index.html" class="btn btn-primary">Return to Dashboard</a>
    </div>
    <script src="main.js"></script>
</body>
</html>
