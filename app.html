<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EmailArmor | Real-Time Bulk Email Validator App</title>
    <meta name="description" content="Verify your email lists in real-time. Use the EmailArmor bulk validator to check syntax, domains, and spam traps instantly.">
    <meta name="keywords" content="bulk email validator, real-time email verification, check email list, clean email list">
    <link rel="stylesheet" href="index.css">
    <style>
        .status-badge {
            padding: 0.3rem 0.8rem;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 700;
        }
        .status-valid { background: rgba(34, 197, 94, 0.15); color: #4ade80; border: 1px solid rgba(34, 197, 94, 0.3); }
        .status-invalid { background: rgba(239, 68, 68, 0.15); color: #f87171; border: 1px solid rgba(239, 68, 68, 0.3); }
        .progress-container {
            height: 8px;
            background: rgba(0,0,0,0.3);
            border-radius: 4px;
            margin-bottom: 2rem;
            overflow: hidden;
            display: none;
            border: 1px solid var(--glass-border);
        }
        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.3s ease;
            box-shadow: 0 0 10px var(--primary);
        }
    </style>
</head>
<body>
    <header>
        <div class="container">
            <nav>
                <a href="index.html" class="logo-container">
                    <img src="logo.png" alt="EmailArmor Logo">
                    <span class="brand">EmailArmor</span>
                </a>
                <a href="index.html" class="btn glass-card">Exit App</a>
            </nav>
        </div>
    </header>

    <main class="app-container section hero mt-3">
        <div class="container" style="max-width: 900px;">
            <div class="validator-box animate-on-scroll">
                <h1 class="mb-1">Batch <span class="gradient-text">Validator</span></h1>
                <p class="text-dim mb-2">Paste up to 100 emails to verify (one per line or comma separated).</p>
                
                <textarea id="emailInput" placeholder="user1@example.com&#10;user2@gmail.com..."></textarea>
                
                <div class="progress-container" id="progressContainer">
                    <div class="progress-bar" id="progressBar"></div>
                </div>

                <div class="flex" style="gap: 1rem; align-items: center;">
                    <button id="validateBtn" class="btn btn-primary" style="flex: 1; border-radius: 16px;">Start Deep Validation</button>
                    <button id="downloadBtn" class="btn glass-card" style="display: none; border-radius: 16px;">Download Valid CSV</button>
                </div>
            </div>

            <div id="resultsSection" style="display: none;">
                <div class="grid grid-2 mt-3">
                    <div class="glass-card text-center">
                        <h4 class="text-dim">VALID</h4>
                        <div id="validCount" style="font-size: 3.5rem; font-weight: 800; color: #4ade80;">0</div>
                    </div>
                    <div class="glass-card text-center">
                        <h4 class="text-dim">INVALID</h4>
                        <div id="invalidCount" style="font-size: 3.5rem; font-weight: 800; color: #f87171;">0</div>
                    </div>
                </div>

                <div class="glass-card mt-2 p-0" style="padding: 0; overflow: hidden;">
                    <table style="width: 100%; border-collapse: collapse; text-align: left;">
                        <thead style="background: rgba(255,255,255,0.02);">
                            <tr style="border-bottom: 1px solid var(--glass-border);">
                                <th style="padding: 1.5rem 1rem;">Email</th>
                                <th style="padding: 1.5rem 1rem;">Status</th>
                                <th style="padding: 1.5rem 1rem;">Detail</th>
                            </tr>
                        </thead>
                        <tbody id="resultsTable"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <script src="main.js"></script>
    <script src="app.js"></script>
</body>
</html>
